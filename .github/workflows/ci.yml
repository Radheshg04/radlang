name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Build
        working-directory: core
        run: go build ./...

      - name: Test
        working-directory: core
        run: go test ./...
