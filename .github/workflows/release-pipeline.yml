name: Release Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "core/version"

permissions:
  contents: write

jobs:
  test-packages:
    name: Package Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Build
        working-directory: core
        run: go build ./...

      - name: Test all packages
        working-directory: core
        run: go test ./...

  compile-test:
    name: Compile Test
    runs-on: ubuntu-latest
    needs: test-packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Run compile_test.go
        working-directory: tests
        run: go test -v -run TestCompileHello .

  release:
    name: Cut Release
    runs-on: ubuntu-latest
    needs: compile-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Tag version
        id: tag
        run: |
          VERSION=$(cat core/version | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Build release binaries
        working-directory: core
        run: |
          mkdir -p ../dist

          GOOS=linux   GOARCH=amd64  go build -o ../dist/radlang-linux-amd64       .
          GOOS=linux   GOARCH=arm64  go build -o ../dist/radlang-linux-arm64        .
          GOOS=darwin  GOARCH=amd64  go build -o ../dist/radlang-darwin-amd64      .
          GOOS=darwin  GOARCH=arm64  go build -o ../dist/radlang-darwin-arm64      .
          GOOS=windows GOARCH=amd64  go build -o ../dist/radlang-windows-amd64.exe .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.version }}" \
            --title "${{ steps.tag.outputs.version }}" \
            --generate-notes \
            dist/*
