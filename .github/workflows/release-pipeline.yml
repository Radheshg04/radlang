name: Release Pipeline

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test-packages:
    name: Package Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Build
        working-directory: core
        run: go build ./...

      - name: Test all packages
        working-directory: core
        run: go test ./...

  compile-test:
    name: Compile Test
    runs-on: ubuntu-latest
    needs: test-packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Run compile_test.go
        working-directory: tests
        run: go test -v -run TestCompileHello .

  release:
    name: Cut Release
    runs-on: ubuntu-latest
    needs: compile-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Build release binaries
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p dist

          GOOS=linux   GOARCH=amd64  go build -o dist/radlang-linux-amd64       ./core
          GOOS=linux   GOARCH=arm64  go build -o dist/radlang-linux-arm64        ./core
          GOOS=darwin  GOARCH=amd64  go build -o dist/radlang-darwin-amd64      ./core
          GOOS=darwin  GOARCH=arm64  go build -o dist/radlang-darwin-arm64      ./core
          GOOS=windows GOARCH=amd64  go build -o dist/radlang-windows-amd64.exe ./core

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
